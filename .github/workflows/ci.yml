name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and run tests
        run: docker compose --profile test up --build --exit-code-from order-tests

      - name: Cleanup
        if: always()
        run: docker compose down --remove-orphans

      - name: Login to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push order-service
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag selenium_demo-order-service ghcr.io/rumburakgit/order-service:latest
          docker tag selenium_demo-order-service ghcr.io/rumburakgit/order-service:${{ github.sha }}
          docker push ghcr.io/rumburakgit/order-service:latest
          docker push ghcr.io/rumburakgit/order-service:${{ github.sha }}

      - name: Push order-client
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag selenium_demo-order-client ghcr.io/rumburakgit/order-client:latest
          docker tag selenium_demo-order-client ghcr.io/rumburakgit/order-client:${{ github.sha }}
          docker push ghcr.io/rumburakgit/order-client:latest
          docker push ghcr.io/rumburakgit/order-client:${{ github.sha }}
